<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">制作启动U盘准备图</title>
  <desc id="desc">示意图展示 Debian ISO、Ventoy 安装包和 U 盘三个准备项。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)"/>
  <rect x="48" y="48" width="864" height="444" rx="28" fill="#ffffff" stroke="#d6e4ff" stroke-width="2"/>
  <text x="80" y="110" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="34" font-weight="700" fill="#163b66">准备镜像、工具和U盘</text>
  <text x="80" y="150" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#4c6480">先下载 Debian 镜像和 Ventoy 安装包，再开始制作启动U盘。</text>

  <rect x="92" y="205" width="220" height="190" rx="22" fill="#fff4e8" stroke="#ffbe78" stroke-width="2"/>
  <circle cx="202" cy="265" r="42" fill="#ff8a3d"/>
  <circle cx="202" cy="265" r="18" fill="#fff4e8"/>
  <text x="202" y="338" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#8c3f00">镜像文件</text>
  <text x="202" y="370" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#805b3b">Debian ISO</text>

  <rect x="370" y="205" width="220" height="190" rx="22" fill="#ebfff6" stroke="#6fd3a7" stroke-width="2"/>
  <rect x="430" y="238" width="100" height="74" rx="12" fill="#18a36a"/>
  <path d="M445 332h70" stroke="#18a36a" stroke-width="10" stroke-linecap="round"/>
  <text x="480" y="370" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#2b6c53">Ventoy 安装包</text>

  <rect x="648" y="205" width="220" height="190" rx="22" fill="#eef3ff" stroke="#95adff" stroke-width="2"/>
  <rect x="718" y="228" width="80" height="124" rx="20" fill="#4b73ff"/>
  <rect x="744" y="214" width="28" height="28" rx="8" fill="#4b73ff"/>
  <circle cx="758" cy="330" r="8" fill="#dce6ff"/>
  <text x="758" y="370" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#3e5293">8GB 以上U盘</text>

  <path d="M322 300h34" stroke="#9bb5d6" stroke-width="4" stroke-dasharray="8 10" stroke-linecap="round"/>
  <path d="M600 300h34" stroke="#9bb5d6" stroke-width="4" stroke-dasharray="8 10" stroke-linecap="round"/>
</svg>
